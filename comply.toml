# comply.toml — Comply's own configuration.
#
# The goal of this file is "as short as possible". Every entry here is a
# real project-specific tuning, not a workaround for a broken rule. When
# we found rules that produced false positives on idiomatic Rust, we
# fixed the rule itself rather than disabling it from here. If this file
# grows, that's a signal the rules need more work — not more overrides.

# `no-multi-op-oneliner` catches cosmetic "expression-too-dense" lines.
# Default `min_ops = 6` is aggressive; Comply's regex/parser helpers
# legitimately chain 7-8 operators in a short-circuit. 10 is strict
# enough to catch the truly obscene chains.
[rules.no-multi-op-oneliner]
min_ops = 10
min_line_length = 100

# Max file lines — Comply's clippy runner, config module, rule registry,
# and main entry point each legitimately exceed 200 lines because each
# is one cohesive unit. 450 is generous but still well under "no limit".
[rules.max-file-lines]
max = 450

[overrides]

# `Backend` enum carries `Box<dyn AstCheck>` / `Box<dyn TextCheck>` trait
# objects — it genuinely cannot derive Debug without forcing every
# concrete check struct to implement Debug AND thread the bound through
# the trait surface. Legitimate architectural exception.
[overrides."**/src/rules/backend.rs"]
disable = ["rust-impl-debug-on-public-types"]

# `RuleDef` carries `Backend` transitively, same reason.
[overrides."**/src/rules/mod.rs"]
disable = ["rust-impl-debug-on-public-types"]

# External-tool JSON schemas (cargo-shear, jscpd, knip, madge, clippy,
# oxlint) mirror contracts we don't own. Adding
# `#[serde(deny_unknown_fields)]` would crash comply every time an
# upstream tool added a field. The deny rule applies to configs WE
# author, not to mirrors.
[overrides."**/src/cargo_shear.rs"]
disable = ["rust-serde-deny-unknown-fields"]
[overrides."**/src/jscpd.rs"]
disable = ["rust-serde-deny-unknown-fields"]
[overrides."**/src/knip.rs"]
disable = ["rust-serde-deny-unknown-fields"]
[overrides."**/src/madge.rs"]
disable = ["rust-serde-deny-unknown-fields"]
[overrides."**/src/clippy/schema.rs"]
disable = ["rust-serde-deny-unknown-fields"]
[overrides."**/src/oxlint/schema.rs"]
disable = ["rust-serde-deny-unknown-fields"]

# The 15 `src/rules/<rule>/rust.rs` files are unwired Check
# implementations and documentation stubs awaiting a future refactor
# that will register them (expanding Rust-side rule coverage by ~10
# rules). Until then, the orphan-module rule correctly identifies them
# as dead code, and their shared scaffold trips the clone detector.
# Both are the right signal long-term; the short-term override avoids
# drowning the other diagnostics.
[overrides."**/src/rules/*/rust.rs"]
disable = ["rust-orphan-module", "no-clones"]

# Test fixtures intentionally contain code patterns the rules flag —
# that's the whole point of a fixture. Silence rules that would
# otherwise scream on every fixture file.
[overrides."tests/**"]
disable = [
  "id-length",
  "no-abbreviated-names",
  "rust-no-unwrap",
  "rust-no-panic",
  "no-clones",
]
