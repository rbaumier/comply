# comply.toml â€” Comply's own configuration.
#
# Comply is a CLI binary and a Rust workspace, not a library or a TS app.
# Several lints designed for libraries / TypeScript apps don't make sense
# here, and a few are only meaningful for first-party callers we don't have.
# We disable them globally with a clear reason next to each one.

# `println!` is the *whole point* of a CLI binary â€” main.rs, list.rs, and
# explain.rs all need to write to stdout. The "no println in library" lint
# is for crates compiled as libraries; it doesn't apply here.
[rules.rust-no-println-in-library]
disabled = true

# `exports-at-top` was designed for TypeScript modules where you put
# `export const X` above private helpers. The Rust idiom is the opposite:
# `mod foo;` declarations come first (they're technically "private items"
# in the export-at-top sense), then `pub use` re-exports. The rule fires
# on every Rust file with even one private `mod` above a `pub use`. Until
# the rule learns about Rust module declarations, we silence it for `.rs`.
[rules.exports-at-top]
disabled = true

# `id-length` is delegated to clippy::min_ident_chars, which flags every
# `i`, `j`, `k`, `e` in idiomatic Rust loop bodies and `match` arms. The
# noise floor is too high to be useful â€” when we have a *real* one-letter
# variable bug, code review catches it. Disable.
[rules.id-length]
disabled = true

# `no-abbreviated-names` flags `args`, `cfg`, `len`, `idx`, `pos`, `ctx`,
# `fmt` and other Rust idioms that no human would expand. Disable for the
# same reason as id-length: the noise outweighs the signal.
[rules.no-abbreviated-names]
disabled = true

# The orphan-module rule flagged 15 stub `rust.rs` files inside
# `src/rules/<rule>/`. Those files are a mix of pure documentation
# (explaining how clippy covers the rule) and real Check implementations
# that were written but never wired in via `mod rust;` from the parent
# `mod.rs`. Wiring them in is a separate refactor (would expand Rust-side
# rule coverage by ~10 rules). Until that lands, we silence the orphan
# rule on these specific paths via the override below.

[overrides]

# Per-rule `rust.rs` files: see the comment above. These are documentation
# stubs / unwired check implementations awaiting a follow-up refactor.
[overrides."**/src/rules/*/rust.rs"]
disable = ["rust-orphan-module", "no-clones"]

# External tool JSON schemas (cargo-shear, jscpd, knip, madge, clippy,
# oxlint). These mirror what the tools emit; we deliberately do NOT use
# `#[serde(deny_unknown_fields)]` here because the tools can and do add
# new fields without warning, and a strict schema would crash comply on
# every tool upgrade. The deny-unknown-fields rule applies to configs WE
# own, not to mirrors of external contracts.
[overrides."**/src/cargo_shear.rs"]
disable = ["rust-serde-deny-unknown-fields"]
[overrides."**/src/jscpd.rs"]
disable = ["rust-serde-deny-unknown-fields"]
[overrides."**/src/knip.rs"]
disable = ["rust-serde-deny-unknown-fields"]
[overrides."**/src/madge.rs"]
disable = ["rust-serde-deny-unknown-fields"]
[overrides."**/src/clippy/schema.rs"]
disable = ["rust-serde-deny-unknown-fields"]
[overrides."**/src/oxlint/schema.rs"]
disable = ["rust-serde-deny-unknown-fields"]

# Test fixtures intentionally contain code patterns the rules flag â€”
# that's the whole point of a fixture. Silence rules that would otherwise
# scream on every fixture file.
[overrides."tests/**"]
disable = [
  "id-length",
  "no-abbreviated-names",
  "rust-no-unwrap",
  "rust-no-panic",
  "no-clones",
]
