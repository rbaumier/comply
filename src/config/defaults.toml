# comply — default configuration.
#
# This file is the single source of truth for every built-in threshold.
# It is embedded in the binary at compile time and merged underneath
# the project's `comply.toml`. Override any knob by declaring the same
# `[rules.<id>] <key> = <value>` entry in your own `comply.toml`.
#
# `comply config print` writes this exact file back to stdout, so
# `comply config init > comply.toml` seeds a project with the same
# defaults, comments included.

# ---------------------------------------------------------------
# File / function size limits.
# ---------------------------------------------------------------

[rules.max-file-lines]
max = 200

[rules.no-large-snapshots]
max_lines = 50

[rules.max-function-lines]
max = 30

# ---------------------------------------------------------------
# Readability heuristics.
# ---------------------------------------------------------------

[rules.no-multi-op-oneliner]
min_ops = 6
min_line_length = 80

[rules.prefer-switch-over-chained-if]
min_arms = 4

# ---------------------------------------------------------------
# Rust-specific thresholds.
# ---------------------------------------------------------------

[rules.rust-no-large-tuple-return]
max_elements = 3

# ---------------------------------------------------------------
# Cross-language thresholds — these propagate into the generated
# oxlintrc + clippy flags, so the same authoritative number flows
# into every linter comply orchestrates.
# ---------------------------------------------------------------

[rules.max-params]
max = 4

[rules.max-depth]
max = 3

[rules.ts-max-params]
max = 3

[rules.nested-control-flow]
max = 3

[rules.id-length]
min = 2
# Uncomment to allowlist identifiers that are conventional at <2 chars:
#   `t` for react-i18next's useTranslation()
#   `T` for typescript generics
exceptions = ["t", "T"]
# exception_patterns = ["^[A-Z]$"]

# ---------------------------------------------------------------
# Complexity / quality thresholds.
# ---------------------------------------------------------------

[rules.cyclomatic-complexity]
max = 10

[rules.cognitive-complexity]
max = 10

[rules.halstead-complexity]
max_volume = 1500
max_difficulty = 30
max_effort = 1000000

[rules.expression-complexity]
max_ops = 4

[rules.regex-complexity]
max = 20

[rules.max-call-chain-depth]
max = 4

[rules.max-union-size]
max = 5

[rules.intermediate-variables]
min_ops = 2

[rules.playwright-max-nested-describe]
max = 5

[rules.playwright-max-expects]
max = 5

[rules.no-section-divider-comments]
min_run = 5

[rules.template-indent]
min_indent = 4

[rules.comment-paraphrases-code]
max_comment_tokens = 6
overlap_threshold = 0.80

[rules.sql-index-needs-rationale-comment]
min_rationale_words = 3
lookback_lines = 3

[rules.no-duplicate-string]
min_length = 10
min_occurrences = 3

# ---------------------------------------------------------------
# Import thresholds.
# ---------------------------------------------------------------

[rules.max-dependencies]
max = 15

# ---------------------------------------------------------------
# Drizzle ORM thresholds.
# ---------------------------------------------------------------

[rules.drizzle-chunk-large-batch-insert]
max = 500

# ---------------------------------------------------------------
# Cross-file centralisation heuristics.
# ---------------------------------------------------------------

# Fraction of the indexed file set that may import a single module
# before it's flagged as over-central. Defaults to 30%. `min_importers`
# gates the rule to avoid firing on tiny projects where every file is
# mathematically a god module.
[rules.god-module]
threshold_percent = 30
min_importers = 10

# ---------------------------------------------------------------
# Disabled by default — opt-in only.
# ---------------------------------------------------------------

[rules.node-no-callback-literal]
disabled = true

[rules.ts-explicit-function-return-type]
disabled = true

[rules.ts-explicit-module-boundary-types]
disabled = true

[rules.no-throw]
disabled = true

# ---------------------------------------------------------------
# Rust correctness / observability — no thresholds, listed here
# so `comply config print` surfaces them and users can flip
# `disabled = true` to opt out per-project.
# ---------------------------------------------------------------

[rules.rust-no-todo-macro]

[rules.rust-no-sleep-in-test]

[rules.rust-prefer-tracing-over-log]

# ---------------------------------------------------------------
# Docker Compose — no thresholds, same rationale as above.
# ---------------------------------------------------------------

[rules.compose-no-network-host]

[rules.compose-healthcheck-required]

# ---------------------------------------------------------------
# NestJS — no thresholds, surfaced for `comply config print`.
# ---------------------------------------------------------------

[rules.nestjs-controller-return-type]

[rules.nestjs-no-entity-in-controller]

[rules.nestjs-no-forwardref-abuse]

# ---------------------------------------------------------------
# Next.js — no thresholds, same rationale.
# ---------------------------------------------------------------

[rules.next-no-redirect-in-try-catch]

# ---------------------------------------------------------------
# Node.js — no thresholds, same rationale.
# ---------------------------------------------------------------

[rules.node-no-unhandled-rejection]

[rules.node-prefer-stream-pipeline]

# ---------------------------------------------------------------
# Security — no thresholds, same rationale.
# ---------------------------------------------------------------

[rules.security-cookie-no-samesite-none]

[rules.security-no-cors-reflect-origin]

[rules.security-no-password-in-log]
